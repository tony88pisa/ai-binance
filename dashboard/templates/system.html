<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System | Antigravity</title>
  <link rel="stylesheet" href="/static/css/main.css?v=9.4">
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">ANTIGRAVITY</span>
    <div class="nav-links">
      <a href="/trading" class="nav-link">Trading</a>
      <a href="/logs" class="nav-link">Logs</a>
      <a href="/learning" class="nav-link">Learning</a>
      <a href="/system" class="nav-link active">System</a>
    </div>
  </nav>

  <div class="main">
    <!-- Connectivity Check -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Connectivity & Access</span>
        <span class="badge badge-blue">Diagnostics</span>
      </div>
      <div class="card-body">
        <div class="grid-3" id="conn-grid">
          <div class="kpi-box">
            <div class="kpi-value c-muted" style="font-size:14px" id="conn-local">...</div>
            <div class="kpi-label">Local URL</div>
          </div>
          <div class="kpi-box">
            <div class="kpi-value c-muted" style="font-size:14px" id="conn-host">...</div>
            <div class="kpi-label">Current Host</div>
          </div>
          <div class="kpi-box">
            <div class="kpi-value" style="font-size:14px" id="conn-proto">...</div>
            <div class="kpi-label">Protocol</div>
          </div>
        </div>
      </div>
    </div>

    <!-- API Health -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">API & Service Status</span>
      </div>
      <div class="card-body table-wrap">
        <table>
          <thead><tr><th>Endpoint</th><th>Status</th><th>Detail</th></tr></thead>
          <tbody id="api-checks">
            <tr><td colspan="3" class="c-muted">Running checks...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- DB Schema -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Database Tables</span>
      </div>
      <div class="card-body table-wrap">
        <table>
          <thead><tr><th>Tabella</th><th>Righe</th></tr></thead>
          <tbody id="db-tables">
            <tr><td colspan="2" class="c-muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Log Files -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Log Files</span>
      </div>
      <div class="card-body table-wrap">
        <table>
          <thead><tr><th>File</th><th>Size</th></tr></thead>
          <tbody id="log-files">
            <tr><td colspan="2" class="c-muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/static/js/system.js?v=9.4"></script>
</body>
</html>
