<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Trader | Tengu V10</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --glass-bg: rgba(30, 41, 59, 0.7);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 16px;
        }
        .nav-links {
            display: flex;
            gap: 16px;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-links a.active {
            color: var(--accent-blue);
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }
        .nav-links a:hover:not(.active) {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        .panel {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }
        .panel-title {
            font-size: 0.9em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chart-container {
            height: 600px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .position-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .pos-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .val-green { color: var(--accent-green); }
        .val-red { color: var(--accent-red); }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 style="margin: 0; font-size: 1.5em; font-weight: 700;">PRO TRADER VIEW</h1>
            <div style="color: var(--text-muted); font-size: 0.9em; margin-top: 4px;">📈 Execution & AI Analysis</div>
        </div>
        <div class="nav-links">
            <a href="/commander">Dashboard</a>
            <a href="/trader" class="active">Pro Trader</a>
            <a href="/agents">Agent Swarm</a>
            <a href="/memory">🧠 Memory</a>
        </div>
    </div>

    <div class="grid">
        <!-- CHAT WIDGET -->
        <div class="panel" style="padding: 0; border: none;">
            <!-- TradingView Widget BEGIN -->
            <div class="tradingview-widget-container chart-container">
              <div id="tradingview_1"></div>
              <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
              <script type="text/javascript">
              new TradingView.widget(
              {
              "autosize": true,
              "symbol": "BINANCE:BTCUSDT",
              "interval": "15",
              "timezone": "Etc/UTC",
              "theme": "dark",
              "style": "1",
              "locale": "en",
              "enable_publishing": false,
              "backgroundColor": "#1e293b",
              "gridColor": "#334155",
              "hide_top_toolbar": false,
              "hide_legend": false,
              "save_image": false,
              "container_id": "tradingview_1"
            }
              );
              </script>
            </div>
            <!-- TradingView Widget END -->
        </div>

        <!-- POSITIONS & ALERTS -->
        <div class="panel">
            <div class="panel-title">
                <span>🟢 Active Positions</span>
            </div>
            <div id="positions-box">
                <div style="color: var(--text-muted); font-size: 0.9em;">Nessuna posizione aperta.</div>
            </div>

            <div class="panel-title" style="margin-top: 32px;">
                <span>⚡ AI Signals (Live)</span>
            </div>
            <div id="signals-box" style="font-size: 0.9em; line-height: 1.5; color: var(--text-muted);">
                Attendere il report dell'algoritmo...
            </div>
        </div>
    </div>

    <script>
        async function fetchTraderData() {
            try {
                // Fetch state
                const res = await fetch('/api/state');
                const data = await res.json();
                
                const posBox = document.getElementById('positions-box');
                const positions = data.positions || [];
                
                if (positions.length > 0) {
                    posBox.innerHTML = positions.map(p => `
                        <div class="position-card">
                            <div class="pos-header">
                                <span>${p.asset || 'UNKNOWN'}</span>
                                <span class="${p.pnl >= 0 ? 'val-green' : 'val-red'}">${p.pnl > 0 ? '+' : ''}${(p.pnl || 0).toFixed(2)}%</span>
                            </div>
                            <div style="font-size: 0.85em; color: var(--text-muted); display: grid; grid-template-columns: 1fr 1fr;">
                                <div>Entry: $${(p.entry_price || 0).toLocaleString()}</div>
                                <div>Dec: ${p.decision || 'HOLD'}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    posBox.innerHTML = '<div style="color: var(--text-muted); font-size: 0.9em;">Nessuna posizione reale in Testnet.</div>';
                }

                // Append reasoning to signals
                const resArena = await fetch('/api/commander/data');
                const arena = await resArena.json();
                const signBox = document.getElementById('signals-box');
                
                if (arena.reasoning && arena.reasoning.length > 0) {
                    signBox.innerHTML = arena.reasoning[0]; // just show the latest
                }

            } catch (err) {
                console.error(err);
            }
        }

        setInterval(fetchTraderData, 3000);
        fetchTraderData();
    </script>
</body>
</html>
